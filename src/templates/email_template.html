<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f5f5f5;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; background-color: #ffffff;">
        <div style="text-align: center; padding: 30px 0;">
            <p style="font-size: 18px; color: #333333; margin: 0 0 10px 0;">Your verification code is:</p>
            
            <div style="background-color: #f0f0f0; border: 2px solid #ddd; border-radius: 8px; padding: 25px; margin: 25px 0; display: inline-block;">
                <p style="font-size: 35px; font-weight: bold; color: #333333; margin: 0; letter-spacing: 2px;">{{code}}</p>
            </div>
            
            <p style="font-size: 14px; color: #666666; margin: 20px 0;">Expires in {{expiry_mins}} minutes.</p>
        </div>
        
        <div style="text-align: center; padding: 20px 0; border-top: 1px solid #eeeeee; margin-top: 30px;">
            <p style="font-size: 12px; color: #999999; margin: 0;">
                <a href="https://github.com/unswsecsoc/UNSW-Discord-Verification-Bot" style="color: #0066cc; text-decoration: none;">Verification bot</a> made by the 
                <span style="color: #555555; font-weight: bold;">UNSW Security Society</span>.
            </p>
        </div>
    </div>
</body>
</html>
